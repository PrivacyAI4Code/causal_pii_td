general:
  experiment_name: 14b_qwen_stack_v2_fim
  hub_name: yanghuattt
  seed: 42
  log_dir: logs
  data_dir: data
  ckpt_dir: ckpts
  post_eval_dir: post_eval
  

dataset:
  source_name: bigcode/the-stack-v2-dedup
  subset: Java
  num_samples: 1200000
  num_refine_samples: 1800
  n_train: 1200
  n_val: 150
  n_test: 150
  sample_size: 150
  visualize_size: 150

  visualize_dir: visualize

  using_cache:
    password: True
    ip_address: True
    email: True
    name: True
    username: True
    key: True
  
  refine_context_length:
    password: 500
    key: 500
    ip_address: 500
    email: 500
    name: 500
    username: 500
  

  sample_threshold:
    password: 95
    ip_address: 95
    email: 90
    name: 90
    username: 90
    key: 90

model:
  model_name_or_path: Qwen/Qwen2.5-Coder-14B
  
  # lora
  use_lora: True
  lora_target_modules: q_proj,k_proj,v_proj,o_proj
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  
  # training parameters
  num_train_epochs: 10
  
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 16
  do_train: True
  do_eval: True

  # fim
  using_fim: True
  fim_rate: 0.5
  fim_spm_rate: 0.5
  learning_rate: 0.0001
  weight_decay: 0.05
  warmup_steps: 100
  gradient_accumulation_steps: 8
  block_size: 1024
  save_every_epoch: True
  torch_dtype: bfloat16
  report_to: none
  
  push_to_hub: False

  post_eval_batch_size: 8  # Evaluation batch size
  post_attack_batch_size: 8  # Attack batch size

  prompt_missing_size: 50